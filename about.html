<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — DoItNow</title>
    <link rel="stylesheet" href="assets/css/themes.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .about-page{padding:1.5rem 2rem 2.5rem;}
        .about-intro{display:flex;justify-content:space-between;align-items:flex-end;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
        .about-intro h1,.about-intro p{margin:0;}
        .team-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1.5rem;width:100%;align-items:stretch;}
        .team-card{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;gap:1rem;padding:1.25rem 1rem 1.5rem;background:transparent;border-radius:16px;box-shadow:none;min-height:100%;}
        .team-photo{width:min(100%,320px);aspect-ratio:1/1;border-radius:22px;object-fit:cover;background:var(--nm-flat);display:block;}
        .team-name{margin:0.25rem 0 0;}
        .team-role{margin:0;color:var(--text-muted);}
        .socials{display:flex;flex-wrap:wrap;justify-content:center;gap:0.75rem;margin-top:auto;}
        .socials a{min-width:110px;justify-content:center;}
        @media (max-width:1024px){.team-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
        @media (max-width:720px){.about-page{padding:1.25rem;}.team-grid{grid-template-columns:1fr;}.team-card{padding:1rem 0.75rem 1.25rem;}.socials a{min-width:96px;}}
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <aside class="sidebar-container">
            <div class="sidebar-logo">
                <div class="logo-dot"></div>
                <span>DoItNow</span>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i data-lucide="layout-dashboard"></i> <span>Dashboard</span>
                </a>
                <a href="analytics.html" class="menu-item">
                    <i data-lucide="activity"></i> <span>Analytics</span>
                </a>
                <a href="calendar.html" class="menu-item">
                    <i data-lucide="calendar"></i> <span>Calendar</span>
                </a>
                <a href="settings.html" class="menu-item">
                    <i data-lucide="settings"></i> <span>Settings</span>
                </a>
                <a href="about.html" class="menu-item active">
                    <i data-lucide="users"></i> <span>About</span>
                </a>
            </nav>

            <div class="sidebar-profile-card">
                <div class="profile-avatar-slot">U</div>
                <div class="profile-info-slot">
                    <h4 id="profile-name-display">User Workspace</h4>
                    <p id="profile-streak-display">🔥 0 Day Streak</p>
                </div>
            </div>
        </aside>

        <main class="main-workspace">
            <div class="about-page">
                <header class="about-intro">
                    <div>
                        <h1>About the Developers</h1>
                        <p>The people behind DoItNow.</p>
                    </div>
                    <button class="nm-btn" id="theme-toggle" aria-label="Toggle Interface Theme">
                        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
                    </button>
                </header>

                <section>
                    <div class="team-grid">
                        <article class="team-card">
                            <img class="team-photo" src="assets/JAGADEESH.png" alt="Developer One photo">
                            <h3 class="team-name">Jagadeesh Kota</h3>
                            <p class="team-role">Developer</p>
                            <div class="socials">
                                <a href="https://github.com/kota-jagadeesh" target="_blank" rel="noopener" class="nm-btn">GitHub <i data-lucide="github"></i></a>
                                <a href="https://www.instagram.com/__jagadeesh__04_" target="_blank" rel="noopener" class="nm-btn">Instagram <i data-lucide="instagram"></i></a>
                                <a href="https://kota-neon.vercel.app" target="_blank" rel="noopener" class="nm-btn">Portfolio <i data-lucide="external-link"></i></a>
                            </div>
                        </article>

                        <article class="team-card">
                            <img class="team-photo" src="assets/BHARATH.png" alt="Developer Two photo">
                            <h3 class="team-name">Bharath Simha</h3>
                            <p class="team-role">Developer</p>
                            <div class="socials">
                                <a href="https://github.com/bharath2011114" target="_blank" rel="noopener" class="nm-btn">GitHub <i data-lucide="github"></i></a>
                                <a href="https://instagram.com/" target="_blank" rel="noopener" class="nm-btn">Instagram <i data-lucide="instagram"></i></a>
                                <a href="https://bharath2011114.github.io/Portfolio/" target="_blank" rel="noopener" class="nm-btn">Portfolio <i data-lucide="external-link"></i></a>
                            </div>
                        </article>

                        <article class="team-card">
                            <img class="team-photo" src="assets/PAVAN SHIVA.jpeg" alt="Developer Three photo">
                            <h3 class="team-name">Pavan shiva</h3>
                            <p class="team-role">Developer</p>
                            <div class="socials">
                                <a href="https://github.com/pavan2shiva" target="_blank" rel="noopener" class="nm-btn">GitHub <i data-lucide="github"></i></a>
                                <a href="https://instagram.com/" target="_blank" rel="noopener" class="nm-btn">Instagram <i data-lucide="instagram"></i></a>
                                <a href="https://pavan2shiva.github.io/Portfolio/" target="_blank" rel="noopener" class="nm-btn">Portfolio <i data-lucide="external-link"></i></a>
                            </div>
                        </article>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="assets/js/storage.js" defer></script>
    <script src="assets/js/theme.js" defer></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
